<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signing in… · IIT Madras Placement Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #fafafa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { text-align: center; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
    .spinner { width: 36px; height: 36px; border: 3px solid #f0f0f0; border-top: 3px solid #f27405; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 18px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h3 { color: #1a1a1a; margin-bottom: 8px; }
    p { color: #888; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h3>Completing sign-in…</h3>
    <p>Please wait a moment.</p>
  </div>
  <script>
    // Supabase OAuth sends access_token in URL hash
    // Extract it and exchange for a session, then redirect to dashboard
    const hash = window.location.hash;
    if (hash.includes('access_token')) {
      // The Supabase JS SDK handles this automatically if initialized.
      // Since we're using server-side auth, redirect to dashboard after a moment.
      // For now, just reload the main page — user may need to log in again.
      setTimeout(() => { location.href = '/dashboard'; }, 1500);
    } else {
      setTimeout(() => { location.href = '/auth'; }, 1000);
    }
  </script>
</body>
</html>
